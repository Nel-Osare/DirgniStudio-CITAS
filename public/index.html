<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Dirgni Studio | Gestión de Citas Boutique" />
    
    <!-- Título de la pestaña -->
    <title>Dirgni Studio | Citas</title>

    <!-- Google Fonts: Inter para un look moderno y limpio -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <!-- Motor de Estilos Tailwind CSS: Esencial para los colores dorados y negros -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Optimizaciones de fuente y fondo */
        * {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;

        }

        body, html, #root {

            margin: 0;
            padding: 0;
            background-color: #fafafa;
        }

        /* Prevenimos el scroll horizontal */
        body {
            overflow-x: hidden;
        }

</head>
