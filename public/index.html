<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dirgni Studio | Citas</title>

    <!-- Fuente Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <!-- MOTOR DE DISEÑO (Carga Forzada) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body, html, #root { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: #fafafa; 
        }
        body { overflow-x: hidden; }
        
        /* Estilos de emergencia si Tailwind falla en cargar */
        .fallback-bg { background-color: #000 !important; color: #f59e0b !important; }
    </style>
</head>
<body>
    <noscript>Necesitas habilitar JavaScript para usar el sistema de Dirgni Studio.</noscript>
    <div id="root"></div>
</body>
</html>
